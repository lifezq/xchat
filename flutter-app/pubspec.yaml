name: chat_app
description: A mobile chat application with email authentication
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.1.1
  
  # Network & Storage
  http: ^1.1.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # WebSocket
  web_socket_channel: ^3.0.3
  
  # Audio
  record: ^6.2.0
  audioplayers: ^6.6.0
  permission_handler: ^12.0.1
  
  # Utils
  intl: ^0.20.2
  file_picker: ^10.1.9
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
